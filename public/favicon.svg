<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Elastic brand gradient -->
    <linearGradient id="elasticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00bfb3"/>
      <stop offset="100%" stop-color="#0077cc"/>
    </linearGradient>
    <!-- Accent gradient for telemetry signals -->
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="#0f172a"/>
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#elasticGrad)" stroke-width="1" opacity="0.6"/>
  
  <!-- Central node (Collector) -->
  <circle cx="16" cy="16" r="4" fill="url(#elasticGrad)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="2.5" fill="#0f172a"/>
  <circle cx="16" cy="16" r="1.5" fill="url(#elasticGrad)"/>
  
  <!-- Incoming flow arrows (left side - SDKs) -->
  <g opacity="0.9">
    <!-- Top-left signal -->
    <path d="M6 8 L11 12" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="5" cy="7" r="2" fill="#22c55e"/>
    
    <!-- Middle-left signal -->
    <path d="M4 16 L10 16" stroke="#eab308" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="3" cy="16" r="2" fill="#eab308"/>
    
    <!-- Bottom-left signal -->
    <path d="M6 24 L11 20" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="5" cy="25" r="2" fill="#f97316"/>
  </g>
  
  <!-- Outgoing flow (right side - to Elastic) -->
  <g opacity="0.9">
    <!-- Telemetry stream -->
    <path d="M20 16 L27 16" stroke="url(#signalGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Arrow head -->
    <path d="M25 13 L28 16 L25 19" stroke="url(#elasticGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Orbiting data particles -->
  <circle cx="16" cy="9" r="1" fill="#3b82f6" opacity="0.8"/>
  <circle cx="22" cy="13" r="0.8" fill="#f59e0b" opacity="0.8"/>
  <circle cx="22" cy="19" r="0.8" fill="#10b981" opacity="0.8"/>
  <circle cx="16" cy="23" r="1" fill="#ec4899" opacity="0.8"/>
  <circle cx="10" cy="19" r="0.8" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="10" cy="13" r="0.8" fill="#06b6d4" opacity="0.8"/>
</svg>
