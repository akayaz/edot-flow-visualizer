name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: edot-flow-visualizer
  REGISTRY: ghcr.io
  NAMESPACE: edot-visualizer

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      # For GKE deployments
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}
      #
      # - name: Get GKE credentials
      #   uses: google-github-actions/get-gke-credentials@v2
      #   with:
      #     cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
      #     location: ${{ vars.GKE_CLUSTER_ZONE }}

      # For generic Kubernetes clusters
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          kubectl config use-context ${{ vars.K8S_CONTEXT }}

      - name: Update image in deployment
        run: |
          cd k8s
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k k8s/
          kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl get deployment ${{ env.IMAGE_NAME }} -n ${{ env.NAMESPACE }}
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=edot-flow-visualizer

          echo "Checking health endpoint..."
          POD=$(kubectl get pod -n ${{ env.NAMESPACE }} -l app=edot-flow-visualizer -o jsonpath="{.items[0].metadata.name}")
          kubectl exec -n ${{ env.NAMESPACE }} $POD -- curl -f http://localhost:3000/api/health || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back..."
          kubectl rollout undo deployment/${{ env.IMAGE_NAME }} -n ${{ env.NAMESPACE }}
