# Elastic Open Web Crawler config for Elastic EDOT docs.
# Index target: edot-kb-docs

output_sink: elasticsearch
output_index: edot-kb-docs

max_crawl_depth: 5
max_unique_url_count: 2000
max_body_size: 5_242_880
purge_crawl_enabled: false
threads_per_crawl: 6
stats_dump_interval: 20

elasticsearch:
  host: <%= ENV['ES_HOST'] %>
  port: 443
  api_key: <%= ENV['ES_API_KEY'] %>
  pipeline: edot-assistant-processing
  pipeline_enabled: true

domains:
  - url: https://www.elastic.co
    seed_urls:
      - https://www.elastic.co/docs/reference/opentelemetry
      - https://www.elastic.co/docs/reference/edot-collector
      - https://www.elastic.co/docs/reference/opentelemetry/edot-sdks/python
      - https://www.elastic.co/docs/reference/opentelemetry/edot-sdks/java
      - https://www.elastic.co/docs/reference/opentelemetry/edot-sdks/node
      - https://www.elastic.co/docs/reference/opentelemetry/edot-sdks/dotnet
      - https://www.elastic.co/docs/reference/opentelemetry/edot-sdks/android
      - https://www.elastic.co/docs/solutions/observability/apm/opentelemetry
      - https://www.elastic.co/docs/solutions/search/elastic-agent-builder
      - https://www.elastic.co/docs/solutions/search/semantic-search
    sitemap_urls:
      - https://www.elastic.co/sitemap.xml

    exclude_tags:
      - header
      - footer
      - nav

    crawl_rules:
      - policy: allow
        type: begins
        pattern: /docs/reference/opentelemetry
      - policy: allow
        type: begins
        pattern: /docs/reference/edot-collector
      - policy: allow
        type: begins
        pattern: /docs/solutions/observability/apm/opentelemetry
      - policy: allow
        type: begins
        pattern: /docs/solutions/search/elastic-agent-builder
      - policy: allow
        type: begins
        pattern: /docs/solutions/search/semantic-search
      - policy: deny
        type: regex
        pattern: .*
