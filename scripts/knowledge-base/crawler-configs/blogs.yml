# Elastic Open Web Crawler config for trusted OTel/Elastic blogs.
# Index target: edot-kb-docs

output_sink: elasticsearch
output_index: edot-kb-docs

max_crawl_depth: 4
max_unique_url_count: 1500
max_body_size: 5_242_880
purge_crawl_enabled: false
threads_per_crawl: 5
stats_dump_interval: 20

elasticsearch:
  host: <%= ENV['ES_HOST'] %>
  port: 443
  api_key: <%= ENV['ES_API_KEY'] %>
  pipeline: edot-assistant-processing
  pipeline_enabled: true

domains:
  - url: https://www.elastic.co
    seed_urls:
      - https://www.elastic.co/observability-labs/blog
      - https://www.elastic.co/search-labs/blog
    exclude_tags:
      - header
      - footer
      - nav
    crawl_rules:
      - policy: allow
        type: begins
        pattern: /observability-labs/blog
      - policy: allow
        type: begins
        pattern: /search-labs/blog
      - policy: deny
        type: regex
        pattern: .*

  - url: https://opentelemetry.io
    seed_urls:
      - https://opentelemetry.io/blog
    sitemap_urls:
      - https://opentelemetry.io/sitemap.xml
    exclude_tags:
      - header
      - footer
      - nav
    crawl_rules:
      - policy: allow
        type: begins
        pattern: /blog
      - policy: deny
        type: regex
        pattern: .*
