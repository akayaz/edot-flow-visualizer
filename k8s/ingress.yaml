---
# Standard Ingress (works with NGINX Ingress Controller, self-managed clusters)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edot-visualizer
  namespace: edot-visualizer
  labels:
    app: edot-flow-visualizer
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"  # For SSE connections
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # Enable WebSocket and SSE support
    nginx.ingress.kubernetes.io/websocket-services: "edot-visualizer"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "3600"

    # Optional: Rate limiting
    # nginx.ingress.kubernetes.io/limit-rps: "10"

    # Optional: Cert Manager for automatic TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx  # Change to your ingress class

  # TLS configuration (uncomment and configure)
  # tls:
  #   - hosts:
  #       - edot-visualizer.example.com
  #     secretName: edot-visualizer-tls

  rules:
    - host: edot-visualizer.example.com  # UPDATE with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edot-visualizer
                port:
                  name: http

