---
apiVersion: v1
kind: Service
metadata:
  name: edot-visualizer
  namespace: edot-visualizer
  labels:
    app: edot-flow-visualizer
    component: frontend
  annotations:
    # GKE-specific annotations (uncomment if using GKE)
    # cloud.google.com/load-balancer-type: "Internal"  # or "External"
    # cloud.google.com/backend-config: '{"default": "edot-visualizer-backendconfig"}'
spec:
  type: ClusterIP  # Change to LoadBalancer for external access without Ingress
  sessionAffinity: ClientIP  # Sticky sessions for SSE connections
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours for long-lived SSE connections

  selector:
    app: edot-flow-visualizer
    component: frontend

  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
