---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edot-visualizer
  namespace: edot-visualizer
  labels:
    app: edot-flow-visualizer
    component: frontend
    version: v0.1.0
spec:
  replicas: 2  # Adjust based on load requirements
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployments

  selector:
    matchLabels:
      app: edot-flow-visualizer
      component: frontend

  template:
    metadata:
      labels:
        app: edot-flow-visualizer
        component: frontend
        version: v0.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"

    spec:
      # Security context for pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Anti-affinity for high availability (spread across nodes)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - edot-flow-visualizer
                topologyKey: kubernetes.io/hostname

      containers:
        - name: edot-visualizer
          image: edot-flow-visualizer:latest  # UPDATE with your image registry
          imagePullPolicy: IfNotPresent  # Change to Always for production with registry

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Environment variables from ConfigMap
          envFrom:
            - configMapRef:
                name: edot-visualizer-config
            # Uncomment if you have secrets
            # - secretRef:
            #     name: edot-visualizer-secrets

          # Resource limits and requests
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Liveness probe - restarts container if unhealthy
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          # Readiness probe - removes from service if not ready
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          # Startup probe - for slow-starting applications
          startupProbe:
            httpGet:
              path: /api/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 12  # 60 seconds to start

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Next.js needs write access
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          # Volume mounts for Next.js cache (optional, improves performance)
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next/cache

      volumes:
        - name: next-cache
          emptyDir: {}

      # Image pull secrets (if using private registry)
      # imagePullSecrets:
      #   - name: regcred

      # Termination grace period
      terminationGracePeriodSeconds: 30
