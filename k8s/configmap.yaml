---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edot-visualizer-config
  namespace: edot-visualizer
  labels:
    app: edot-flow-visualizer
    component: configuration
data:
  # Application configuration
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"

  # Public URL - UPDATE THIS for your domain
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  # Optional: Enable demo mode
  NEXT_PUBLIC_DEMO_MODE: "true"
