---
# IMPORTANT: This is a template for secrets
# DO NOT commit actual secrets to version control
# Create this secret using: kubectl create secret generic ... --from-literal=...
#
# Example:
# kubectl create secret generic edot-visualizer-secrets \
#   --namespace edot-visualizer \
#   --from-literal=ELASTIC_APM_SECRET_TOKEN=your-secret-token \
#   --from-literal=ELASTIC_APM_ENDPOINT=https://your-deployment.apm.cloud.es.io:443

apiVersion: v1
kind: Secret
metadata:
  name: edot-visualizer-secrets
  namespace: edot-visualizer
  labels:
    app: edot-flow-visualizer
    component: secrets
type: Opaque
data:
  # Base64 encoded secrets (use kubectl create secret to generate)
  # ELASTIC_APM_SECRET_TOKEN: <base64-encoded-value>
  # ELASTIC_APM_ENDPOINT: <base64-encoded-value>
